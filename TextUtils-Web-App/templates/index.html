<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text Utils</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body
    style="background-color: rgb(0, 0, 0)"
    class="fs-5"
    data-bs-theme="dark"
  >
    <nav class="navbar navbar-expand-lg bg-success" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">TextUtils.com</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item ms-5">
              <a class="nav-link active" aria-current="page" href="/">Home</a>
            </li>
            <li class="nav-item ms-5">
              <a class="nav-link active" href="#">About Us</a>
            </li>

            <li class="nav-item ms-5">
              <a class="nav-link active" href="#">Contact Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Form -->
    <form action="/remove_punc" method="get" class="container mt-5 fs-4">
      <div class="mb-3">
        <label for="exampleFormControlTextarea1" class="form-label"
          >Enter your text and see the magic</label
        >
        <textarea
          class="form-control"
          id="exampleFormControlTextarea1"
          name="text"
          rows="7"
        ></textarea>
      </div>
      <!-- Option: Remove Punctuation -->
      <div class="form-check form-switch">
        <input
          name="remove_punc"
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckDefault1"
        />
        <label class="form-check-label" for="switchCheckDefault1"
          >Remove punctuation</label
        >
      </div>
      <!-- Option: Convert to Upper Case -->
      <div class="form-check form-switch">
        <input
          name="upper_case"
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckDefault2"
        />
        <label class="form-check-label" for="switchCheckDefault2"
          >UPPER CASE</label
        >
      </div>

      <!-- Option: Convert to Lower Case -->
      <div class="form-check form-switch">
        <input
          name="lower_case"
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckDefault4"
        />
        <label class="form-check-label" for="switchCheckDefault4"
          >lower case</label
        >
      </div>

      <!-- Option: Convert to Title Case -->
      <div class="form-check form-switch">
        <input
          name="title"
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckDefault5"
        />
        <label class="form-check-label" for="switchCheckDefault5">Title</label>
      </div>

      <!-- Option: Capitalize First Letter -->
      <div class="form-check form-switch">
        <input
          name="capitalize"
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckDefault6"
        />
        <label class="form-check-label" for="switchCheckDefault6"
          >Capitalize</label
        >
      </div>

      <!-- Option: Check if All Digits -->
      <div class="form-check form-switch">
        <input
          name="isallnum"
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckDefault3"
        />
        <label class="form-check-label" for="switchCheckDefault3"
          >Is all digit</label
        >
      </div>

      <!-- Option: Check if All Alphabets -->
      <div class="form-check form-switch">
        <input
          name="isallpha"
          class="form-check-input"
          type="checkbox"
          role="switch"
          id="switchCheckDefault7"
        />
        <label class="form-check-label" for="switchCheckDefault7"
          >Is all alphabetic</label
        >
      </div>

      <button type="submit" class="btn btn-primary mt-3">Analysis</button>
    </form>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
